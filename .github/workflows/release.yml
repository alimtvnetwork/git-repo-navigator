name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Build release binaries
        working-directory: gitmap
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X 'github.com/user/gitmap/constants.Version=$VERSION'"

          TARGETS=(
            "windows/amd64/.exe"
            "windows/arm64/.exe"
            "linux/amd64/"
            "linux/arm64/"
            "darwin/amd64/"
            "darwin/arm64/"
          )

          mkdir -p dist

          for target in "${TARGETS[@]}"; do
            IFS='/' read -r os arch ext <<< "$target"
            OUTPUT="dist/gitmap-${os}-${arch}${ext}"
            echo "Building $OUTPUT..."
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -ldflags "$LDFLAGS" -o "$OUTPUT" .
          done

          # Compress assets
          cd dist
          for f in gitmap-windows-*; do
            [[ -f "$f" ]] && zip "${f%.exe}.zip" "$f" && rm "$f"
          done
          for f in gitmap-linux-* gitmap-darwin-*; do
            [[ -f "$f" ]] && tar czf "${f}.tar.gz" "$f" && rm "$f"
          done

          # Generate checksums
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gitmap/dist/*
          generate_release_notes: true
